<!-- Add headers to tables using <th>. Compare difference between <td> and <th>. -->

<!doctype html>
<html>
  <head>
    <title>Table Header Example</title>
  </head>
  <body>
    <h1 align="center">Employee Details</h1>

    <table border="1" align="center" width="50%">
      <tr>
        <th>Employee ID</th>
        <th>Name</th>
        <th>Department</th>
      </tr>

      <tr align="center">
        <td>101</td>
        <td>Anbu Vel</td>
        <td>Java</td>
      </tr>
    </table>
  </body>
</html>
