<!-- Practice creating a webpage with a header and footer. Add title, logo, and footer info. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample semantic page</title>
  </head>
  <body>
    <header>
      <h2
        style="
          background-color: red;
          color: aliceblue;
          margin: 50px;
          padding: 20px;
          padding-left: 150px;
        "
      >
        YOUTUBE.COM
      </h2>
    </header>
    <figure style="margin-left: 170px">
      <img src="./image5.png" alt="youtube logo" />
      <figcaption>Video sharing company</figcaption>
    </figure>

    <footer style="margin-top: 50px; margin-left: 130px">
      <h2>Copyrigts@fromYoutube.com</h2>
      <p><a href="#">Back to top</a></p>
    </footer>
  </body>
</html>
