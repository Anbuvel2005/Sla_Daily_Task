<!-- Learn the structure of tables. Create a simple table with rows and columns. -->



<!doctype html>
<html>
  <head>
    <title>Table Header Example</title>
  </head>
  <body>
    <h1 align="center">Employee Details</h1>

    <table border="1" align="center" width="50%">
      <tr>
        <th>Employee ID</th>
        <th>Name</th>
        <th>Department</th>
      </tr>

      <tr>
        <td>101</td>
        <td>Anbu Vel</td>
        <td>Java</td>
      </tr>

      <tr>
        <td>102</td>
        <td>Rahul</td>
        <td>Python</td>
      </tr>

      <tr>
        <td>103</td>
        <td>Shreya</td>
        <td>Testing</td>
      </tr>
    </table>
  </body>
</html>
