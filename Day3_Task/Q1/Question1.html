<!-- Learn the difference between unordered (<ul>) and ordered (<ol>) lists. Create shopping list and steps list. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <h1>Ordered Lists</h1>
    <h3>Steps list of Maggi Preparation</h3>

    <ol type="1">
      <li>Boil the water</li>
      <li>add the noodles</li>
      <li>add some masalas and veggies</li>
      <li>heat for 2 minutes</li>
      <li>Ready to serve</li>
    </ol>

    <h1>Unordered Lists</h1>
    <h3>Shopping lists of Supermarket</h3>

    <ul>
      <li type="circle">chicken masala</li>
      <li type="circle">mutton masala</li>
      <li type="circle">fish masala</li>
      <li type="circle">Rice</li>
      <li type="circle">Soap</li>
    </ul>
  </body>
</html>
