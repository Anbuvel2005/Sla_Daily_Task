<!-- Practice using <li> inside <ul> and <ol>. Create nested lists (list inside another list). -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nested Lists</title>
  </head>
  <body>
    <h3>Nested Lists for ul</h3>
    <ul
      style="
        background-color: red;
        border: 3px solid black;
        border-radius: 2px;
        padding: 20px;
        color: aliceblue;
        margin-left: 5px;
      "
    >
      <li>
        Fruits
        <ul>
          <li type="square">Apple</li>
          <li type="square">banana</li>
          <li type="square">Grapes</li>
        </ul>
      </li>
    </ul>

    <h3>Nested Lists for li</h3>
    <ol
      style="
        background-color: blue;
        border: 3px solid black;
        border-radius: 2px;
        padding: 20px;
        color: aliceblue;
        margin-left: 5px;
      "
    >
      <li>
        Full stack dev Roadmap
        <ol>
          <li>HTML</li>

          <li>CSS</li>
          <li>Bootstrap</li>
          <li>Tailwind</li>
          <li>Javascript</li>
          <li>React js</li>
          <li>Java</li>
          <li>SpringBoot</li>
          <li>My Sql</li>
        </ol>
      </li>
    </ol>
  </body>
</html>
